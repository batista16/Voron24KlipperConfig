    SET_PIN PIN=bedlight VALUE=0
    G4 P500
    SET_PIN PIN=caselight VALUE=1
    SET_PIN PIN=bedlight VALUE=1
    G4 P500
    SET_PIN PIN=caselight VALUE=0
    SET_PIN PIN=bedlight VALUE=0
    G4 P500
    SET_PIN PIN=caselight VALUE=1
    SET_PIN PIN=bedlight VALUE=1
    G4 P500
    SET_PIN PIN=caselight VALUE=0
    SET_PIN PIN=bedlight VALUE=0
    G4 P500
    SET_PIN PIN=caselight VALUE=1
    SET_PIN PIN=bedlight VALUE=1
    G4 P500
