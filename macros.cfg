[gcode_macro test_speed_fast]
gcode:
        G28 X0 Y0
        GET_POSITION
        G1 X0 Y0     F27000
        G1 X350 Y350 F27000
        G1 X0 Y0     F27000
        G1 X350 Y350 F27000

        G1 X0 Y350 F36000

        G1 X350 Y0 F27000
        G1 X0 Y350 F27000
        G1 X350 Y0 F27000
        G1 X0 Y350 F27000

        G1 X0 Y0 F36000
        G1 X350 Y0 F36000
        G1 X350 Y350 F36000
        G1 X0 Y350 F36000
        G1 X0 Y0 F36000
        G28 X0 Y0
        GET_POSITION

[gcode_macro PURGE_LINE]
# A purge line on the left of the bed to prime the extruder
gcode:
    G92 E0 ; zero/reset extruder
    G1 X2.2 Y2 Z0.3 F18000 ; move to start position
    #G1 E+15 F150 ; extrude to put the pressure (-20 from purge macro)
    G92 E0
    G1 X2.2 Y100 Z0.25 F1500 E10 ; extrude the first line
    G1 X2.5 Y100 Z0.3 F18000 ; move to side a little
    G1 X2.5 Y2 Z0.25 F1500.0 E20 ; extrude the second line
    G92 E0 ; zero/reset extruder
    G1 Z2.0 E-0.1 F3000 ; move nozzle up and retract tiny bit
    G92 E0

[gcode_macro UNLOAD_FILAMENT]
gcode:
    M83
    G1 E10 F300
    G1 E-200 F1800
    M82

[gcode_macro LOAD_FILAMENT]
gcode:
    M83
    G1 E90 F1800
    G1 E50 F300
    G1 E15 F150
    M82

######################################################################
# Filament Change
######################################################################

# M600: Filament Change. This macro will pause the printer, move the
# tool to the change position, and retract the filament 50mm. Adjust
# the retraction settings for your own extruder. After filament has
# been changed, the print can be resumed from its previous position
# with the "RESUME" gcode.

[pause_resume]

[gcode_macro M600]
gcode:
    {% set X = params.X|default(175)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    UNLOAD_FILAMENT
    RESTORE_GCODE_STATE NAME=M600_state

# Convert Marlin linear advance (M900) commands to Klipper (SET_PRESSURE_ADVANCE) commands.
# Used in conjunction with Marlin's linear advance calibration tool: 
# https://marlinfw.org/tools/lin_advance/k-factor.html
[gcode_macro M900]
gcode:
	# Parameters
	{% set pa = params.K|float %}
	
	SET_PRESSURE_ADVANCE ADVANCE={pa}